<!DOCTYPE html>
<html>
<head>
  <title>Gesture Control</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: sans-serif;
      background: #1a1a1a;
      color: #eee;
      padding: 14px;
      min-width: 240px;
    }

    h2 {
      font-size: 15px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 12px;
      letter-spacing: 0.3px;
    }

    #camera-wrap {
      position: relative;
      width: 100%;
      background: #000;
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 12px;
      aspect-ratio: 4 / 3;
    }

    #video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transform: scaleX(-1);
    }

    #gesture-overlay {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(76, 175, 80, 0.9);
      color: #fff;
      font-size: 12px;
      font-weight: bold;
      padding: 4px 12px;
      border-radius: 12px;
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.15s ease;
    }

    #gesture-overlay.visible {
      opacity: 1;
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: #999;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      background: #555;
      transition: background 0.3s;
    }

    .dot.connected    { background: #4caf50; }
    .dot.disconnected { background: #f44336; }
  </style>
</head>
<body>
  <h2>Gesture Control</h2>

  <div id="camera-wrap">
    <video id="video" autoplay playsinline muted></video>
    <div id="gesture-overlay"></div>
  </div>

  <div class="status-row">
    <div class="dot" id="server-dot"></div>
    <span id="server-status">Waiting for server...</span>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
