<!DOCTYPE html>
<html>
  <head>
    <title>Hand Gesture Recognition</title>
    <style>
      body {
        font-family: sans-serif;
        text-align: center;
        margin: 0;
        padding: 12px;
        background-color: #1a1a1a;
        color: white;
        width: 320px;
      }
      h1 {
        font-size: 18px;
        margin-bottom: 10px;
      }
      #videoContainer {
        position: relative;
        width: 100%;
        margin: 0 auto 10px;
      }
      #video {
        width: 100%;
        aspect-ratio: 4/3;
        background-color: #000;
        border-radius: 8px;
        display: block;
      }
      #canvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
      }
      .button-container {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }
      .button-container #status {
        grid-column: 1 / -1;
      }
      button {
        display: block;
        width: 100%;
        margin: 0;
        padding: 10px;
        font-size: 14px;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        transition: background-color 0.2s;
      }
      #activateCamera {
        background-color: #4CAF50;
      }
      #activateCamera:hover {
        background-color: #45a049;
      }
      #stopCamera {
        background-color: #dc3545;
        display: none;
      }
      #stopCamera:hover {
        background-color: #c82333;
      }
      #stopCamera.active {
        display: block;
      }
      #scrollUp, #scrollDown {
        background-color: #007bff;
      }
      #scrollUp:hover, #scrollDown:hover {
        background-color: #0056b3;
      }
      #status {
        margin: 0;
        padding: 10px;
        background-color: #2a2a2a;
        border-radius: 6px;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <h1>Hand Gesture Recognition</h1>
    <div id="videoContainer">
      <video id="video" autoplay playsinline></video>
      <canvas id="canvas"></canvas>
      <iframe id="sandbox" src="sandbox.html" style="display:none;"></iframe>
    </div>
    <div class="button-container">
      <button id="activateCamera">Activate Camera</button>
      <button id="stopCamera">Stop Camera</button>
      <div id="status">Click to start</div>
      <button id="scrollUp">Scroll Up</button>
      <button id="scrollDown">Scroll Down</button>
    </div>

    <script src="window.js"></script>
  </body>
</html>
